file_format: definition/2
attributes:
  - key: myapp.service.id
    type: string
    stability: stable
    brief: Stable identifier of the service.
    examples: ["svc_42"]
  - key: myapp.service.name
    type: string
    stability: stable
    brief: Human-readable service name.
    note: Defaults to the executable name when the service does not set one explicitly.
    examples: ["checkout"]
  - key: myapp.service.tier
    type:
      members:
        - id: free
          value: free
          stability: stable
          brief: Free tier.
        - id: pro
          value: pro
          stability: stable
          brief: Pro tier.
    stability: stable
    brief: Service tier.
  - key: myapp.service.identifier
    type: string
    stability: stable
    deprecated:
      reason: renamed
      renamed_to: myapp.service.id
      note: Renamed to `myapp.service.id`.
    brief: Stable identifier of the service.
    examples: ["svc_42"]
entities:
  - type: myapp.service
    stability: stable
    brief: A deployed service instance.
    note: Identified by a stable id that survives restarts.
    identity:
      - ref: myapp.service.id
        requirement_level: required
    description:
      - ref: myapp.service.name
      - ref: myapp.service.tier
  - type: myapp.legacy.service
    stability: stable
    deprecated:
      reason: renamed
      renamed_to: myapp.service
      note: Renamed to `myapp.service`.
    brief: A deployed legacy service instance.
    identity:
      - ref: myapp.service.identifier
        requirement_level: required
  - type: myapp.worker
    stability: stable
    deprecated:
      reason: obsoleted
      note: Workers are no longer modeled as a separate entity.
    brief: A background worker process.
    identity:
      - ref: myapp.service.identifier
        requirement_level: required
