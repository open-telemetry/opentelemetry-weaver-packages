file_format: definition/2
attributes:
  - key: myapp.task.id
    type: string
    stability: stable
    brief: Unique identifier of the task.
    examples: ["task_0001", "task_0042"]
  - key: myapp.task.state
    type:
      members:
        - id: queued
          value: queued
          stability: stable
          brief: The task is waiting to run.
        - id: running
          value: running
          stability: stable
          brief: The task is running.
        - id: done
          value: done
          stability: stable
          brief: The task finished.
    stability: stable
    brief: Current state of the task.
  - key: myapp.task.retries
    type: int
    stability: stable
    brief: Number of times the task was retried.
    examples: 42
  - key: myapp.task.priority
    type: int
    stability: stable
    brief: Priority of the task.
    examples: 0
  - key: myapp.task.owner
    type: string
    stability: stable
    brief: Owner of the task.
    examples: solo
  - key: myapp.task.cancelled
    type: boolean
    stability: stable
    brief: Whether the task was cancelled.
    examples: false
  - key: myapp.task.tags
    type: string[]
    stability: stable
    brief: Tags attached to the task.
    examples:
      - ["a", "b"]
      - ["c"]
  - key: myapp.task.config
    type: string
    stability: stable
    brief: Serialized task configuration.
    examples:
      - |-
        {
          "retries": 3
        }
