file_format: definition/2
attributes:
- key: my.key
  type: string
  brief: A key in my registry
  stability: stable

metrics:
  - name: some.stable.metric
    brief: this is a stable metric
    stability: stable
    instrument: counter
    unit: s
  - name: some.metric.items
    brief: this is a metric with items
    stability: stable
    instrument: gauge
    unit: ms
  - name: some.metric.attrs
    brief: this is a metric with attributes
    stability: stable
    instrument: counter
    unit: s
    attributes:
    - ref: my.key
      requirement_level: required
  - name: some.metric.with.note
    brief: this is a metric with a note
    note: This is an additional note about the metric.
    stability: development
    instrument: histogram
    unit: ms
  - name: some.deprecated.metric
    brief: this is a deprecated metric
    stability: stable
    deprecated:
      reason: obsoleted
      note: Use `some.stable.metric` instead.
    instrument: counter
    unit: s
