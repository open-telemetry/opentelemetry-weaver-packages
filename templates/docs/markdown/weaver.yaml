# Markdown documentation generation for a semantic convention registry.
#
# Generates the attribute registry (per-namespace pages + README) and ships
# `snippet.md.j2`, the embed template used by `weaver registry update-markdown`
# to refresh `<!-- weaver {jq} -->` blocks inside hand-written docs.
#
# Filters operate on the resolved registry that `weaver registry generate --v2`
# hands to templates. `.registry.attributes` contains only locally-owned
# attributes; imported attributes (from dependencies) appear inside signals with
# `provenance: null`.

# ───────────────────────── Registry-specific configuration ─────────────────────────
# Every link the templates emit is an explicit param here (read by links.j2);
# nothing is hardcoded in the templates. Override per registry via `--param`
# (scalars) or your own copy of this file. Two independent categories:
params:
  # This registry's own generated attribute pages (relative links).
  registry_base_url: /docs/registry/

  # --- OpenTelemetry general guidance links (planet-wide singletons) ---
  # Not tied to any particular dependency; kept here only so they are easy to update.
  otel_requirement_level_url: https://opentelemetry.io/docs/specs/semconv/general/attribute-requirement-level/
  otel_naming_recommendations_url: https://opentelemetry.io/docs/specs/semconv/general/naming/#recommendations-for-application-developers
  otel_recording_errors_url: https://opentelemetry.io/docs/specs/semconv/general/recording-errors/

  # --- Upstream / dependency docs (per-registry choice) ---
  # Where the attributes this registry *imports* are documented. Not necessarily
  # semantic-conventions. `{namespace}` is substituted per imported attribute.
  # TODO: support routing imports to multiple upstreams.
  upstream_docs_base: https://github.com/open-telemetry/semantic-conventions/blob/main
  imported_attribute_path_template: /docs/registry/attributes/{namespace}.md

# Acronyms interpreted by the `acronym` filter when title-casing namespaces.
# Override per registry (e.g. add your product/provider names).
acronyms:
  - AI
  - API
  - CLI
  - HTTP
  - JSON
  - SDK
  - URL

templates:
  - pattern: attributes_readme.md.j2
    filter: semconv_grouped_attributes({"v2":true})
    application_mode: single
    file_name: attributes/README.md

  - pattern: attribute_namespace.md.j2
    filter: semconv_grouped_attributes({"v2":true})
    application_mode: each
    file_name: "attributes/{{ ctx.root_namespace | kebab_case }}.md"

  - pattern: registry_readme.md.j2
    filter: "."
    application_mode: single
    file_name: README.md

  # entity registry
  - pattern: entity_readme.md.j2
    filter: >
      try (semconv_signal("entity"; {"v2":true, "exclude_deprecated":true})
      | group_by(.root_namespace)
      | map({ root_namespace: .[0].root_namespace, entities: . | sort_by(.type) })) catch empty
    application_mode: single
    file_name: "entities/README.md"

  - pattern: entity_namespace.md.j2
    filter: >
      try (semconv_signal("entity"; {"v2":true, "exclude_deprecated":true})
      | group_by(.root_namespace)
      | map({ root_namespace: .[0].root_namespace, entities: . | sort_by(.type) })) catch empty
    application_mode: each
    file_name: "entities/{{ ctx.root_namespace | kebab_case }}.md"
